name: Deploy GitHub Pages

# main の内容を gh-pages ブランチに同期する。
# GitHub Pages は gh-pages ブランチを公開する設定のため、これだけでサイトが更新される。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: main を gh-pages へ反映
        run: git push origin HEAD:gh-pages --force
