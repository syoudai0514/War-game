<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>群衆大戦 - ARMY RUSH</title>
  <meta name="description" content="兵士の大群を率い、+や×のゲートで仲間を増やして全員で撃ちまくる!サクサク中毒の群衆シューター。">
  <meta name="theme-color" content="#0a1322">

  <!-- OGP -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="群衆大戦 - ARMY RUSH">
  <meta property="og:description" content="ゲートで仲間を増やし、大群で撃ちまくれ!">
  <meta property="og:url" content="https://syoudai0514.github.io/War-game/">

  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <div id="game-wrap">
    <canvas id="view"></canvas>

    <!-- 上部 HUD -->
    <div id="hud-top">
      <div class="stat"><span class="ic">📏</span><span id="dist">0</span>m</div>
      <div class="stat"><span class="ic">🪙</span><span id="coins">0</span></div>
      <div class="stat"><span class="ic" id="wpn-ic">🔫</span><span id="wpn-name">ピストル</span></div>
      <button id="mute">🔊</button>
    </div>

    <!-- 操作ヒント -->
    <div id="hint">⬅ ドラッグで部隊を動かす ➡</div>

    <!-- ゲームオーバー / 強化ショップ -->
    <div id="overlay" class="hidden">
      <div class="panel">
        <h2 id="ov-title">リザルト</h2>
        <div class="result">
          <div><span class="big" id="ov-dist">0</span><small>m 到達</small></div>
          <div><span class="big" id="ov-best">0</span><small>m ベスト</small></div>
        </div>
        <div class="coins-row">🪙 <b id="ov-coins">0</b>　<small>(+<span id="ov-earned">0</span> 獲得)</small></div>

        <div class="shop-title">⚡ 強化してもっと強く</div>
        <div id="shop"></div>

        <button id="restart">▶ もう一度プレイ</button>
      </div>
    </div>

    <!-- スタートゲート -->
    <div id="start-gate">
      <div class="gate-inner">
        <h1>🎯 群衆大戦</h1>
        <p class="tagline">ARMY RUSH</p>
        <div class="how">
          <p>① 指で<b>部隊を左右に動かす</b></p>
          <p>② <b>+ や ×</b> のゲートで<b>仲間を増やす</b></p>
          <p>③ 全員で<b>銃を撃って</b>敵バリアを破壊</p>
          <p>④ <b>武器UP</b>で火力を強化!ボスを倒せ</p>
        </div>
        <p class="start-hint">タップで開始</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=3"></script>
</body>
</html>
